on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: default
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: "1.23" 
    - run: go build -o kubegen ./cmd/cli
    - uses: actions/upload-artifact@v4
      with:
       name: kubegen-bin
       path: kubegen
