name: Build
on:
  # push:
  #   tags:
  #     - "*"
  #   branches:
  #     - "main"
  release:
    types: [published]

jobs:
  build:
    runs-on: default
    steps:
    # Setup
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: "1.26" 

    # Build
    - name: Build
      run: |
        mkdir bin
        TAG="${{ forge.ref_name }}"
        GOOS=linux GOARCH=amd64 go build -o bin/kubegen_${TAG}_linux ./cmd/kubegen
        GOOS=windows GOARCH=amd64 go build -o bin/kubegen_${TAG}_win.exe ./cmd/kubegen
        GOOS=darwin GOARCH=arm64 go build -o bin/kubegen_${TAG}_mac ./cmd/kubegen

    # Publish
    - name: Publish to ${{ forge.ref_name }}
      uses: actions/forgejo-release@v2
      with:
        direction: upload
        url: http://forgejo
        repo: rosco/kubegen
        token: ${{ secrets.app_token }}
        override: true
        release-dir: bin
    - name: Publish to latest
      uses: actions/forgejo-release@v2
      with:
        direction: upload
        url: http://forgejo
        repo: rosco/kubegen
        token: ${{ secrets.app_token }}
        override: true
        release-dir: bin
        tag: latest
