name: Build
on:
  # push:
  #   tags:
  #     - "*"
  #   branches:
  #     - "main"
  release:
    types: [published]

jobs:
  build:
    runs-on: default
    steps:
    # Setup
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: "1.26" 
    - run: mkdir bin
    # Build
    - run: GOOS=linux GOARCH=amd64 go build -o bin/kubegen ./cmd/kubegen_${{ forge.ref_name }}_linux
    - run: GOOS=windows GOARCH=amd64 go build -o bin/kubegen ./cmd/kubegen_${{ forge.ref_name }}_win
    - run: GOOS=darwin GOARCH=arm64 go build -o bin/kubegen ./cmd/kubegen_${{ forge.ref_name }}_mac
    # Publish
    - uses: actions/forgejo-release@v2
      with:
        direction: upload
        url: http://forgejo
        repo: rosco/kubegen
        token: ${{ secrets.app_token }}
        override: true
        release-dir: bin
    - uses: actions/forgejo-release@v2
      with:
        direction: upload
        url: http://forgejo
        repo: rosco/kubegen
        token: ${{ secrets.app_token }}
        override: true
        release-dir: bin
        tag: latest
