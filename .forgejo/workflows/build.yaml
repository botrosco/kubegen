on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: default
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: "1.23" 
    - run: go build -o kubegen ./cmd/cli
    - uses: actions/upload-artifact@v3
      with:
       name: kubegen-bin
       path: kubegen
    - uses: actions/forgejo-release@v2
      with:
        direction: upload
        url: http:forgejo
        repo: botrosco/kubegen
        token: "989bf5a8423ee4ee33c421709ff120a46183d69a"
        tag: test
        release-dir: kubegen
