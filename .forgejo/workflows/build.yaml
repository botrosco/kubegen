name: Build
on:
  # push:
  #   tags:
  #     - "*"
  #   branches:
  #     - "main"
  release:
    types: [published]

jobs:
  build:
    runs-on: default
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: "1.26" 
    - run: mkdir bin
    - run: go build -o bin/kubegen ./cmd/kubegen
    - uses: actions/forgejo-release@v2
      with:
        direction: upload
        url: http://forgejo
        repo: rosco/kubegen
        token: ${{ secrets.app_token }}
        override: true
        release-dir: bin
    - uses: actions/forgejo-release@v2
      with:
        direction: upload
        url: http://forgejo
        repo: rosco/kubegen
        token: ${{ secrets.app_token }}
        override: true
        release-dir: bin
        tag: latest
