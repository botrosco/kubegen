on:
  # push:
  #   branches:
  #     - "main"
  release:
    types: [published]

jobs:
  build:
    runs-on: default
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: "1.23" 
    - run: mkdir bin
    - run: go build -o bin/kubegen ./cmd/cli
    # - uses: actions/upload-artifact@v3
    #   with:
    #    name: kubegen-bin
    #    path: kubegen
    - uses: actions/forgejo-release@v2
      with:
        direction: upload
        url: http://forgejo
        repo: rosco/kubegen
        token: "8ea95fbfebb912bd149f711ee6eea136a6b542a1"
        # tag: test
        release-dir: bin
        verbose: true
